        let currentVideoUrl = '';

        // Load History on Page Load
        document.addEventListener('DOMContentLoaded', () => {
            renderHistory();
        });

        // Format duration helper (sec to mm:ss)
        function formatDuration(seconds) {
            if (!seconds) return '00:00';
            const mins = Math.floor(seconds / 60);
            const secs = Math.floor(seconds % 60);
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        // Show Toast Notification
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 2500);
        }

        // Parse Form Handler

            event.preventDefault();
            const urlInput = document.getElementById('video-url');
            const submitBtn = document.getElementById('submit-btn');
            const spinner = document.getElementById('spinner');
            const btnText = document.getElementById('btn-text');
            const resultPanel = document.getElementById('result-panel');
            
            const rawUrl = urlInput.value.trim();
            if (!rawUrl) return;

            // Update UI to loading state
            submitBtn.disabled = true;
            spinner.style.display = 'block';
            btnText.style.visibility = 'hidden';
            
            try {
                const response = await fetch('/parse', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ url: rawUrl })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.detail || '解析失败，请检查链接是否正确');
                }

                // Populate UI results
                document.getElementById('res-cover').src = data.thumbnail;
                document.getElementById('res-duration').textContent = formatDuration(data.duration);
                document.getElementById('res-title').textContent = data.title;
                document.getElementById('res-author').textContent = data.uploader;
                
                // Platforms
                const platformBadge = document.getElementById('res-platform');
                platformBadge.textContent = data.extractor;
                platformBadge.className = 'platform-badge'; // Reset classes
                if (data.extractor.toLowerCase().includes('tiktok')) {
                    platformBadge.classList.add('platform-tiktok');
                } else {
                    platformBadge.classList.add('platform-douyin');
                }

                // Set download & preview link with download flag
                currentVideoUrl = data.video_url;
                document.getElementById('download-btn').href = `${data.video_url}&download=1`;
                document.getElementById('preview-btn').href = data.video_url;

                // Display result panel
                resultPanel.style.display = 'block';
                // Trigger smooth slide-in/fade-in animation
                setTimeout(() => {
                    resultPanel.classList.add('show');
                }, 50);

                // Add to history
                saveToHistory(data);

                // Clear input
                urlInput.value = '';

            } catch (error) {
                console.error('Parse Error:', error);
                alert(error.message || '网络连接错误，请稍后再试');
            } finally {
                // Restore button state
                submitBtn.disabled = false;
                spinner.style.display = 'none';
                btnText.style.visibility = 'visible';
            }
        }

        // Copy download URL
        function copyDownloadLink() {
            if (!currentVideoUrl) return;
            navigator.clipboard.writeText(currentVideoUrl)
                .then(() => showToast('无水印下载链接已成功复制到剪贴板！'))
                .catch(err => {
                    console.error('Copy error:', err);
                    showToast('复制失败，请手动选择复制');
                });
        }

        // History Management
        function saveToHistory(item) {
            let history = JSON.parse(localStorage.getItem('parse_history') || '[]');
            
            // Remove duplicates (checking by ID)
            history = history.filter(h => h.id !== item.id);
            
            // Push to start of list
            history.unshift({
                id: item.id,
                title: item.title,
                thumbnail: item.thumbnail,
                uploader: item.uploader,
                duration: item.duration,
                video_url: item.video_url,
                extractor: item.extractor
            });

            // Limit history to 15 items
            if (history.length > 15) {
                history.pop();
            }

            localStorage.setItem('parse_history', JSON.stringify(history));
            renderHistory();
        }

        function renderHistory() {
            const historyList = document.getElementById('history-list');
            const clearBtn = document.getElementById('clear-btn');
            const history = JSON.parse(localStorage.getItem('parse_history') || '[]');

            if (history.length === 0) {
                historyList.innerHTML = '<div class="empty-history">暂无解析记录</div>';
                clearBtn.style.display = 'none';
                return;
            }

            clearBtn.style.display = 'flex';
            historyList.innerHTML = '';

            history.forEach(item => {
                const div = document.createElement('div');
                div.className = 'history-item';
                div.onclick = () => loadHistoryItem(item);

                div.innerHTML = `
                    <img class="history-thumb" src="${item.thumbnail}" alt="thumb">
                    <div class="history-details">
                        <div class="history-item-title">${item.title}</div>
                        <div class="history-item-meta">
                            <span>@${item.uploader}</span>
                            <span>|</span>
                            <span>${formatDuration(item.duration)}</span>
                            <span>|</span>
                            <span style="text-transform:uppercase; font-weight:600; color: ${item.extractor.toLowerCase().includes('tiktok') ? '#ff0050' : '#00f2fe'}">${item.extractor}</span>
                        </div>
                    </div>
                `;
                historyList.appendChild(div);
            });
        }

        function loadHistoryItem(item) {
            // Populate UI results from history
            document.getElementById('res-cover').src = item.thumbnail;
            document.getElementById('res-duration').textContent = formatDuration(item.duration);
            document.getElementById('res-title').textContent = item.title;
            document.getElementById('res-author').textContent = item.uploader;

            const platformBadge = document.getElementById('res-platform');
            platformBadge.textContent = item.extractor;
            platformBadge.className = 'platform-badge';
            if (item.extractor.toLowerCase().includes('tiktok')) {
                platformBadge.classList.add('platform-tiktok');
            } else {
                platformBadge.classList.add('platform-douyin');
            }

            currentVideoUrl = item.video_url;
            document.getElementById('download-btn').href = `${item.video_url}&download=1`;
            document.getElementById('preview-btn').href = item.video_url;

            const resultPanel = document.getElementById('result-panel');
            resultPanel.style.display = 'block';
            setTimeout(() => {
                resultPanel.classList.add('show');
            }, 50);

            // Scroll smoothly to results
            resultPanel.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        function clearHistory() {
            if (confirm('确定要清空所有的解析记录吗？')) {
                localStorage.removeItem('parse_history');
                renderHistory();
            }
        }
    </script>
</body>
</html>
